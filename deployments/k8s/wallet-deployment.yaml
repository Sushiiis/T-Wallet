apiVersion: apps/v1
kind: Deployment
metadata:
  name: t-wallet
  labels:
    app: t-wallet
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: t-wallet
  template:
    metadata:
      labels:
        app: t-wallet
    spec:
      containers:
        - name: wallet
          image: t-wallet:latest
          imagePullPolicy: Never
          command: ["/wallet"]
          ports:
            - name: grpc
              containerPort: 50051
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: t-wallet-config
            - secretRef:
                name: t-wallet-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # Liveness: процесс жив — использует /healthz из Этапа 1.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          # Readiness: зависимости (Postgres) доступны — /readyz пингует пул.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          # Startup: даёт время на холодный старт (миграции, подключения),
          # прежде чем liveness начнёт засчитывать провалы.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2